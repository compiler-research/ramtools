codecov:
  require_ci_to_pass: yes

coverage:
  precision: 2
  round: down
  range: "70...100" 
  
  status:
    project:
      default:
        target: auto      # Uses coverage from base commit
        threshold: 2      # Allow 2% drop
        informational: false  
        
    patch:
      default:
        target: 85        # New code should have 85% coverage
        threshold: 2      # Allow 2% variance
        informational: false  
        
    changes: no

parsers:
  gcov:
    branch_detection:
      conditional: yes
      loop: yes
      method: no
      macro: no

comment:
  layout: "reach, diff, flags, tree, files"
  behavior: default
  require_changes: no

ignore:
  - "test/**/*"
  
  - "benchmark/**/*"
  
  - "scripts/**/*"
  - "**/*.C"
  
  - "Doxyfile"

flags:
  ramcore:
    paths:
      - "src/ramcore/**"
      - "inc/ramcore/**"
    carryforward: true
    
  rntuple:
    paths:
      - "src/rntuple/**"
      - "inc/rntuple/**"
    carryforward: true
    
  ttree:
    paths:
      - "src/ttree/**"
      - "inc/ttree/**"
    carryforward: true
    
  tools:
    paths:
      - "tools/**"
    carryforward: true

github_checks:
  annotations: true